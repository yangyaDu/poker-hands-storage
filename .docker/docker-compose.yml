services:
  poker-hands-storage:
    build:
      context: ..
      dockerfile: .docker/Dockerfile
    image: poker-hands-storage:local
    init: true
    ports:
      - "8080:8080"
    volumes:
      - ${PHS_HOST_DATA_DIR:-../data/proto-v3}:/data:ro
    environment:
      PHS_BIND: 0.0.0.0:8080
      PHS_DATA_DIR: /data
      PHS_MAX_OPEN_HANDLES: "2"
      PHS_METADATA_CACHE_BYTES: "8388608"
      PHS_STRATEGY_CACHE_BYTES: "67108864"
      PHS_VERIFY_CHECKSUMS: "true"
      PHS_PREWARM: default:6:100
      RUST_LOG: info
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "/usr/local/bin/poker-hands-storage-service",
          "healthcheck",
          "--url",
          "http://127.0.0.1:8080/ready",
          "--timeout-ms",
          "3000",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
