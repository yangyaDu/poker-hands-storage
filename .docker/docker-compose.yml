services:
  poker-hands-storage:
    build:
      context: ..
      dockerfile: .docker/Dockerfile
    image: poker-hands-storage:local
    init: true
    ports:
      - "8080:8080"
    volumes:
      - ../data/range-strata:/data:ro
    environment:
      PHS_BIND: 0.0.0.0:8080
      PHS_DATA_DIR: /data
      PHS_META_DB: /data/meta.db
      PHS_MAX_OPEN_HANDLES: "3"
      PHS_VERIFY_CHECKSUMS: "true"
      PHS_PREWARM: default:6:100
      RUST_LOG: info
